<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <title>Scanner — EventFlow Africa</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
  <link href="css/dashboard.css" rel="stylesheet">
</head>
<body data-page="scan">

  <main class="scan-page-main">
    <div class="d-flex justify-content-between align-items-center mb-4">
      <a href="index.html" class="text-white-50"><i class="bi bi-arrow-left"></i></a>
      <img src="img/logo.png" alt="EventFlow" height="36">
      <button type="button" class="btn btn-sm btn-ef-outline" data-action="logout">Sortir</button>
    </div>

    <h1 class="h4 mb-1">Mode staff — Jour J</h1>
    <p class="text-white-50 small mb-2">Scannez les QR codes à l'entrée. Logs automatiques. Fonctionne hors ligne.</p>
    <p class="small mb-4">Entrées validées : <strong id="scan-counter">0</strong>
      <span id="offline-queue-badge" class="badge bg-warning text-dark ms-2 d-none">0</span> en attente sync
    </p>

    <div class="mb-3" id="scan-event-filter-wrap">
      <label class="form-label text-white-50 small" for="scan-event-filter">Filtrer par événement</label>
      <select id="scan-event-filter" class="form-select form-select-sm"></select>
    </div>

    <div class="d-flex gap-2 mb-3">
      <button type="button" class="btn btn-ef-primary flex-fill" id="start-scanner-btn">
        <i class="bi bi-camera-video me-1"></i> Scanner
      </button>
      <button type="button" class="btn btn-ef-outline flex-fill d-none" id="stop-scanner-btn">
        <i class="bi bi-camera-video-off me-1"></i> Arrêter
      </button>
    </div>

    <div id="qr-reader" class="mx-auto" style="max-width:320px"></div>

    <form id="manual-scan-form" class="mt-4">
      <label class="form-label text-white-50 small" for="manual-ticket-code">Saisie manuelle</label>
      <div class="input-group">
        <input type="text" class="form-control" id="manual-ticket-code" placeholder="EFA-XXXXXXXX">
        <button type="submit" class="btn btn-ef-primary">Vérifier</button>
      </div>
    </form>

    <div id="scan-result"></div>

    <button type="button" class="btn btn-ef-outline btn-sm w-100 mt-3" id="sync-offline-btn">
      <i class="bi bi-cloud-arrow-up me-1"></i> Synchroniser scans hors ligne
    </button>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/events.js"></script>
  <script src="js/organizer.js"></script>
  <script src="js/tickets.js"></script>
  <script src="js/scan.js"></script>
  <script src="js/pwa-store.js"></script>
  <script src="js/pwa.js"></script>
</body>
</html>
