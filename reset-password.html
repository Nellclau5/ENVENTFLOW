<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EventFlow">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" href="/icons/icon-192.png" type="image/png" sizes="192x192">
  <link href="css/pwa.css" rel="stylesheet">
  <title>Réinitialiser le mot de passe — EventFlow Africa</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
  <link href="css/auth.css" rel="stylesheet">
</head>
<body>
  <div class="auth-page">
    <div class="auth-sidebar">
      <div class="auth-sidebar-content">
        <h2>Mot de passe oublié ?</h2>
        <p>Pas de panique ! Entrez votre email et nous vous enverrons un lien pour réinitialiser votre mot de passe.</p>
      </div>
    </div>

    <div class="auth-form-section">
      <div class="auth-card">
        <div class="auth-logo">
          <img src="img/logo.png" alt="EventFlow Africa" class="ef-logo ef-logo-auth" width="240" height="48">
        </div>
        <p class="auth-subtitle">Réinitialiser le mot de passe</p>

        <form id="reset-form">
          <div class="mb-4">
            <label class="form-label" for="email">Email</label>
            <input type="email" class="form-control" id="email" required placeholder="votre@email.com">
          </div>
          <button type="submit" class="btn btn-ef-primary w-100 btn-lg">Envoyer le lien</button>
        </form>

        <p class="text-center mt-4 mb-0">
          <a href="login.html" class="auth-link"><i class="bi bi-arrow-left me-1"></i> Retour à la connexion</a>
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/pwa.js"></script>
</body>
</html>
