<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EventFlow">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" href="/icons/icon-192.png" type="image/png" sizes="192x192">
  <link href="css/pwa.css" rel="stylesheet">
  <title>Événements — EventFlow Africa</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
</head>
<body class="public-page" data-page="events">

  <nav class="navbar navbar-expand-lg navbar-dark ef-navbar">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <img src="img/logo.png" alt="EventFlow Africa" class="ef-logo ef-logo-nav" width="220" height="44">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Ouvrir le menu de navigation"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
          <li class="nav-item"><a class="nav-link active" href="events.html">Événements</a></li>
          <li class="nav-item"><a class="nav-link" href="help.html">Aide</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>
        <div class="d-flex align-items-center" id="auth-links"></div>
        <div id="user-menu" class="dropdown ms-3 d-none">
          <button type="button" class="btn btn-ef-outline dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Menu utilisateur"><i class="bi bi-person-circle me-1" aria-hidden="true"></i> <span id="nav-user-name"></span></button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" id="nav-dashboard-link" href="dashboard.html">Mon espace</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><button type="button" class="dropdown-item" data-action="logout">Déconnexion</button></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <section class="py-5 bg-light">
    <div class="container">
      <h1 class="section-title">Tous les événements</h1>
      <p class="section-subtitle mb-4">Trouvez l'événement parfait pour vous</p>

      <!-- Recherche -->
      <form id="events-search-form" class="search-bar-wrapper d-flex flex-column flex-sm-row mb-4">
        <label for="events-search" class="visually-hidden">Rechercher un événement</label>
        <input type="text" id="events-search" class="form-control" placeholder="Titre, lieu, organisateur, description...">
        <button type="submit" class="btn btn-search"><i class="bi bi-search me-1"></i> Rechercher</button>
      </form>

      <!-- Filtres avancés -->
      <form id="events-filters-form" class="events-filters">
        <div>
          <label for="filter-city" class="form-label small text-muted mb-1">Ville</label>
          <input type="text" id="filter-city" class="form-control form-control-sm" placeholder="Ex. Dakar">
        </div>
        <div>
          <label for="filter-date-from" class="form-label small text-muted mb-1">À partir du</label>
          <input type="date" id="filter-date-from" class="form-control form-control-sm">
        </div>
        <div>
          <label for="filter-date-to" class="form-label small text-muted mb-1">Jusqu'au</label>
          <input type="date" id="filter-date-to" class="form-control form-control-sm">
        </div>
        <div>
          <label for="filter-price" class="form-label small text-muted mb-1">Prix</label>
          <select id="filter-price" class="form-select form-select-sm">
            <option value="">Tous</option>
            <option value="free">Gratuit</option>
            <option value="paid">Payant</option>
          </select>
        </div>
        <div>
          <label for="filter-price-min" class="form-label small text-muted mb-1">Prix min (FCFA)</label>
          <input type="number" id="filter-price-min" class="form-control form-control-sm" min="0" placeholder="0">
        </div>
        <div>
          <label for="filter-price-max" class="form-label small text-muted mb-1">Prix max (FCFA)</label>
          <input type="number" id="filter-price-max" class="form-control form-control-sm" min="0" placeholder="50000">
        </div>
        <div>
          <label for="filter-sort" class="form-label small text-muted mb-1">Trier par</label>
          <select id="filter-sort" class="form-select form-select-sm">
            <option value="date-asc">Date (proche)</option>
            <option value="date-desc">Date (lointain)</option>
            <option value="price-asc">Prix croissant</option>
            <option value="price-desc">Prix décroissant</option>
            <option value="popular">Popularité</option>
          </select>
        </div>
        <div class="d-flex align-items-end">
          <button type="button" id="reset-filters-btn" class="btn btn-ef-outline btn-sm w-100">Réinitialiser</button>
        </div>
      </form>

      <!-- Filtres catégories -->
      <div class="category-pills" id="category-filters"></div>

      <p class="text-muted mb-3" id="events-count">Chargement...</p>
      <div class="row" id="events-grid"></div>
    </div>
  </section>

  <footer class="ef-footer">
    <div class="container">
      <div class="ef-footer-bottom mb-0 mt-0 pt-3">
        <p class="mb-0">&copy; 2026 EventFlow Africa. Tous droits réservés.</p>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/events.js"></script>
  <script src="js/tickets.js"></script>
  <script src="js/favorites.js"></script>
  <script src="js/notifications.js"></script>
  <script src="js/support.js"></script>
  <script src="js/main.js"></script>
  <script src="js/pwa.js"></script>
</body>
</html>
