<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EventFlow">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" href="/icons/icon-192.png" type="image/png" sizes="192x192">
  <link href="css/pwa.css" rel="stylesheet">
  <title>Événements — EventFlow Africa</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
</head>
<body class="public-page" data-page="events">

  <nav class="navbar navbar-expand-lg navbar-dark ef-navbar">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <img src="img/logo.png" alt="EventFlow Africa" class="ef-logo ef-logo-nav" width="220" height="44">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Ouvrir le menu de navigation"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
          <li class="nav-item"><a class="nav-link active" href="events.html">Événements</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>
        <div class="d-flex align-items-center" id="auth-links"></div>
        <div id="user-menu" class="dropdown ms-3 d-none">
          <button type="button" class="btn btn-ef-outline dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Menu utilisateur"><i class="bi bi-person-circle me-1" aria-hidden="true"></i> <span id="nav-user-name"></span></button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" id="nav-dashboard-link" href="dashboard.html">Mon espace</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><button type="button" class="dropdown-item" data-action="logout">Déconnexion</button></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <section class="py-5 bg-light">
    <div class="container">
      <h1 class="section-title">Tous les événements</h1>
      <p class="section-subtitle mb-4">Trouvez l'événement parfait pour vous</p>

      <!-- Recherche -->
      <form id="events-search-form" class="search-bar-wrapper d-flex flex-column flex-sm-row mb-4">
        <label for="events-search" class="visually-hidden">Rechercher un événement</label>
        <input type="text" id="events-search" class="form-control" placeholder="Rechercher par titre, lieu...">
        <button type="submit" class="btn btn-search"><i class="bi bi-search me-1"></i> Rechercher</button>
      </form>

      <!-- Filtres catégories -->
      <div class="category-pills" id="category-filters"></div>

      <p class="text-muted mb-3" id="events-count">Chargement...</p>
      <div class="row" id="events-grid"></div>
    </div>
  </section>

  <footer class="ef-footer">
    <div class="container">
      <div class="ef-footer-bottom mb-0 mt-0 pt-3">
        <p class="mb-0">&copy; 2026 EventFlow Africa. Tous droits réservés.</p>
      </div>
    </div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/events.js"></script>
  <script src="js/tickets.js"></script>
  <script src="js/main.js"></script>
  <script src="js/pwa.js"></script>
</body>
</html>
