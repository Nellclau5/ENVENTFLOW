<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <title>Hors ligne — EventFlow Africa</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
  <link href="css/pwa.css" rel="stylesheet">
</head>
<body class="offline-page">
  <div class="offline-container text-center">
    <img src="icons/icon-192.png" alt="EventFlow Africa" width="96" height="96" class="mb-4">
    <h1>Vous êtes hors ligne</h1>
    <p class="text-muted mb-2">Certaines pages restent accessibles grâce au cache intelligent.</p>
    <p id="offline-ticket-hint" class="text-muted small mb-4"></p>
    <div class="d-flex flex-wrap gap-2 justify-content-center">
      <a href="tickets-wallet.html" class="btn btn-ef-primary">
        <i class="bi bi-ticket-perforated me-1"></i> Mes billets (cache)
      </a>
      <button type="button" class="btn btn-ef-outline" onclick="location.reload()">
        <i class="bi bi-arrow-clockwise me-1"></i> Réessayer
      </button>
      <a href="index.html" class="btn btn-ef-outline">Accueil</a>
    </div>
  </div>
  <script src="js/pwa-store.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      if (typeof PWAStore === 'undefined') return;
      const count = await PWAStore.getCachedTicketCount();
      const el = document.getElementById('offline-ticket-hint');
      if (el && count > 0) {
        el.textContent = `${count} billet(s) disponible(s) hors ligne avec QR code.`;
      }
    });
  </script>
</body>
</html>
