<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EventFlow">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" href="/icons/icon-192.png" type="image/png" sizes="192x192">
  <link href="css/pwa.css" rel="stylesheet">
  <title>Contact — EventFlow Africa</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
</head>
<body class="public-page" data-page="contact">

  <nav class="navbar navbar-expand-lg navbar-dark ef-navbar">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <img src="img/logo.png" alt="EventFlow Africa" class="ef-logo ef-logo-nav" width="220" height="44">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Ouvrir le menu de navigation"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
          <li class="nav-item"><a class="nav-link" href="events.html">Événements</a></li>
          <li class="nav-item"><a class="nav-link active" href="contact.html">Contact</a></li>
        </ul>
        <div class="d-flex align-items-center" id="auth-links"></div>
        <div id="user-menu" class="dropdown ms-3 d-none">
          <button type="button" class="btn btn-ef-outline dropdown-toggle" data-bs-toggle="dropdown" aria-expanded="false" aria-label="Menu utilisateur"><i class="bi bi-person-circle me-1" aria-hidden="true"></i> <span id="nav-user-name"></span></button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" id="nav-dashboard-link" href="dashboard.html">Mon espace</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><button type="button" class="dropdown-item" data-action="logout">Déconnexion</button></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <section class="contact-section">
    <div class="container">
      <div class="text-center mb-5">
        <h1 class="section-title">Contactez-nous</h1>
        <p class="section-subtitle mx-auto">Une question ? Notre équipe est là pour vous aider.</p>
      </div>
      <div class="row g-4">
        <div class="col-lg-7">
          <form id="contact-form" class="contact-form">
            <div class="row g-3">
              <div class="col-md-6">
                <label class="form-label" for="contact-name">Nom complet</label>
                <input type="text" class="form-control" id="contact-name" name="name" required placeholder="Votre nom">
              </div>
              <div class="col-md-6">
                <label class="form-label" for="contact-email">Email</label>
                <input type="email" class="form-control" id="contact-email" name="email" required placeholder="votre@email.com">
              </div>
              <div class="col-12">
                <label class="form-label" for="contact-subject">Sujet</label>
                <select class="form-select" id="contact-subject" name="subject" required>
                  <option value="">Choisir un sujet</option>
                  <option value="support">Support technique</option>
                  <option value="organizer">Organiser un événement</option>
                  <option value="partnership">Partenariat</option>
                  <option value="other">Autre</option>
                </select>
              </div>
              <div class="col-12">
                <label class="form-label" for="contact-message">Message</label>
                <textarea class="form-control" id="contact-message" name="message" rows="5" required placeholder="Votre message..."></textarea>
              </div>
              <div class="col-12">
                <button type="submit" class="btn btn-ef-primary btn-lg"><i class="bi bi-send me-1"></i> Envoyer</button>
              </div>
            </div>
          </form>
        </div>
        <div class="col-lg-5">
          <div class="contact-info-card">
            <h4 class="text-white mb-4">Informations</h4>
            <div class="contact-info-item">
              <i class="bi bi-envelope"></i>
              <div><strong>Email</strong><br>contact@eventflowafrica.com</div>
            </div>
            <div class="contact-info-item">
              <i class="bi bi-telephone"></i>
              <div><strong>Téléphone</strong><br>+221 00 000 00 00</div>
            </div>
            <div class="contact-info-item">
              <i class="bi bi-geo-alt"></i>
              <div><strong>Adresse</strong><br>Dakar, Sénégal</div>
            </div>
            <div class="contact-info-item">
              <i class="bi bi-clock"></i>
              <div><strong>Horaires</strong><br>Lun - Ven : 9h - 18h</div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="ef-footer">
    <div class="container"><div class="ef-footer-bottom mb-0 mt-0 pt-3"><p class="mb-0">&copy; 2026 EventFlow Africa</p></div></div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/main.js"></script>
  <script src="js/pwa.js"></script>
</body>
</html>
