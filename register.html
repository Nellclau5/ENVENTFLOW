<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="EventFlow">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" href="/icons/icon-192.png" type="image/png" sizes="192x192">
  <link href="css/pwa.css" rel="stylesheet">
  <title>Inscription — EventFlow Africa</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
  <link href="css/auth.css" rel="stylesheet">
</head>
<body>
  <div class="auth-page">
    <div class="auth-sidebar">
      <div class="auth-sidebar-content">
        <h2>Rejoignez EventFlow Africa</h2>
        <p>Créez votre compte et commencez à découvrir ou organiser des événements exceptionnels.</p>
        <div class="auth-features">
          <div class="auth-feature-item"><i class="bi bi-check-circle-fill"></i> Inscription gratuite</div>
          <div class="auth-feature-item"><i class="bi bi-check-circle-fill"></i> Devenez organisateur en un clic</div>
          <div class="auth-feature-item"><i class="bi bi-check-circle-fill"></i> Accès à tous les événements</div>
        </div>
      </div>
    </div>

    <div class="auth-form-section">
      <div class="auth-card">
        <div class="auth-logo">
          <img src="img/logo.png" alt="EventFlow Africa" class="ef-logo ef-logo-auth" width="240" height="48">
        </div>
        <p class="auth-subtitle">Créez votre compte</p>

        <!-- Sélection du rôle -->
        <label class="form-label">Je suis</label>
        <div class="role-selector mb-4" role="group" aria-label="Type de compte">
          <div class="role-option selected" data-role="user" role="button" tabindex="0" aria-pressed="true">
            <i class="bi bi-person" aria-hidden="true"></i>
            <span>Participant</span>
          </div>
          <div class="role-option" data-role="organizer" role="button" tabindex="0" aria-pressed="false">
            <i class="bi bi-calendar-plus" aria-hidden="true"></i>
            <span>Organisateur</span>
          </div>
        </div>

        <form id="register-form">
          <div class="mb-3">
            <label class="form-label" for="displayName">Nom complet</label>
            <input type="text" class="form-control" id="displayName" required placeholder="Jean Dupont">
          </div>
          <div class="mb-3">
            <label class="form-label" for="email">Email</label>
            <input type="email" class="form-control" id="email" required placeholder="votre@email.com">
          </div>
          <div class="mb-3">
            <label class="form-label" for="password">Mot de passe</label>
            <div class="password-field">
              <input type="password" class="form-control" id="password" required minlength="6" placeholder="Min. 6 caractères">
              <button type="button" class="password-toggle" aria-label="Afficher ou masquer le mot de passe"><i class="bi bi-eye" aria-hidden="true"></i></button>
            </div>
          </div>
          <div class="mb-4">
            <label class="form-label" for="confirmPassword">Confirmer le mot de passe</label>
            <div class="password-field">
              <input type="password" class="form-control" id="confirmPassword" required placeholder="••••••••">
              <button type="button" class="password-toggle" aria-label="Afficher ou masquer la confirmation du mot de passe"><i class="bi bi-eye" aria-hidden="true"></i></button>
            </div>
          </div>
          <button type="submit" class="btn btn-ef-primary w-100 btn-lg">Créer mon compte</button>
        </form>

        <p class="text-center mt-4 mb-0">
          Déjà un compte ? <a href="login.html" class="auth-link">Se connecter</a>
        </p>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/pwa.js"></script>
</body>
</html>
