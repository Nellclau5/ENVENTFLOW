<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0a0a0a">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Mes billets">
  <link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
  <link rel="icon" href="/icons/icon-192.png" type="image/png" sizes="192x192">
  <title>Mes billets — EventFlow Africa</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
  <link href="css/pwa.css" rel="stylesheet">
</head>
<body class="public-page wallet-page" data-page="tickets-wallet">

  <header class="wallet-header">
    <a href="dashboard.html#tickets" class="wallet-back"><i class="bi bi-arrow-left"></i></a>
    <h1><i class="bi bi-ticket-perforated me-2"></i>Mes billets</h1>
    <span id="wallet-offline-badge" class="wallet-offline-badge d-none"><i class="bi bi-wifi-off"></i> Hors ligne</span>
  </header>

  <main class="wallet-main container py-3">
    <p id="wallet-status" class="text-muted small mb-3">Chargement…</p>
    <div id="wallet-tickets-list"></div>
    <div id="wallet-empty" class="text-center py-5 d-none">
      <i class="bi bi-ticket-perforated display-4 text-muted"></i>
      <p class="text-muted mt-3">Aucun billet en cache. Connectez-vous en ligne pour synchroniser.</p>
      <a href="events.html" class="btn btn-ef-primary">Découvrir des événements</a>
    </div>
  </main>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/vendor/qrcodejs.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/tickets.js"></script>
  <script src="js/pwa-store.js"></script>
  <script src="js/pwa.js"></script>
  <script>
    const WalletPage = {
      async init() {
        await AuthService.init();
        this.updateOfflineBadge();
        window.addEventListener('online', () => this.load());
        window.addEventListener('offline', () => this.updateOfflineBadge());

        if (!AuthService.currentUser) {
          if (!navigator.onLine) {
            await this.renderFromCache(null);
            return;
          }
          window.location.href = 'login.html?redirect=tickets-wallet.html';
          return;
        }
        await this.load();
      },

      updateOfflineBadge() {
        const badge = document.getElementById('wallet-offline-badge');
        if (badge) badge.classList.toggle('d-none', navigator.onLine);
      },

      async load() {
        this.updateOfflineBadge();
        const statusEl = document.getElementById('wallet-status');
        const userId = AuthService.currentUser?.uid;

        if (navigator.onLine && userId) {
          try {
            statusEl.textContent = 'Synchronisation…';
            const tickets = await TicketService.getUserTickets(userId);
            await PWAStore.cacheTickets(userId, tickets);
            this.renderTickets(tickets, false);
            statusEl.textContent = `${tickets.filter(t => t.status === 'valid').length} billet(s) — à jour`;
            return;
          } catch (e) {
            console.warn('Wallet online load:', e);
          }
        }

        await this.renderFromCache(userId);
      },

      async renderFromCache(userId) {
        const tickets = await PWAStore.getCachedTickets(userId);
        const statusEl = document.getElementById('wallet-status');
        if (tickets.length) {
          statusEl.textContent = `${tickets.length} billet(s) en cache${navigator.onLine ? '' : ' — mode hors ligne'}`;
          this.renderTickets(tickets, true);
        } else {
          statusEl.textContent = navigator.onLine ? 'Aucun billet' : 'Hors ligne — aucun billet en cache';
          document.getElementById('wallet-tickets-list').innerHTML = '';
          document.getElementById('wallet-empty').classList.remove('d-none');
        }
      },

      renderTickets(tickets, fromCache) {
        const list = document.getElementById('wallet-tickets-list');
        const empty = document.getElementById('wallet-empty');
        const valid = tickets.filter(t => t.status === TICKET_STATUS.VALID || t.status === 'valid');
        if (!valid.length) {
          list.innerHTML = '';
          empty.classList.remove('d-none');
          return;
        }
        empty.classList.add('d-none');
        list.innerHTML = valid.map(t => `
          <div class="wallet-ticket-card" data-ticket-id="${t.id}">
            <div class="wallet-ticket-info">
              <h3>${t.eventTitle || 'Événement'}</h3>
              <p class="text-muted small mb-1">${t.ticketTypeName || 'Standard'} · ${Utils.formatPrice(t.price || t.totalPrice || 0)}</p>
              <code class="small">${t.ticketCode}</code>
              ${fromCache ? '<span class="badge bg-warning text-dark ms-2">Cache</span>' : ''}
            </div>
            <div class="wallet-qr" id="qr-${t.id}"></div>
          </div>
        `).join('');

        valid.forEach(t => {
          const el = document.getElementById(`qr-${t.id}`);
          if (el && t.ticketCode) {
            el.innerHTML = '';
            new QRCode(el, { text: t.ticketCode, width: 120, height: 120 });
          }
        });
      }
    };

    document.addEventListener('DOMContentLoaded', () => WalletPage.init());
  </script>
</body>
</html>
