<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <link rel="manifest" href="/manifest.webmanifest">
  <meta name="theme-color" content="#0a0a0a">
  <title>Centre d'aide — EventFlow Africa</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link href="css/main.css" rel="stylesheet">
</head>
<body class="public-page" data-page="help">

  <nav class="navbar navbar-expand-lg navbar-dark ef-navbar">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <img src="img/logo.png" alt="EventFlow Africa" class="ef-logo ef-logo-nav" width="220" height="44">
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav" aria-controls="navbarNav" aria-expanded="false" aria-label="Menu"><span class="navbar-toggler-icon"></span></button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav mx-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">Accueil</a></li>
          <li class="nav-item"><a class="nav-link" href="events.html">Événements</a></li>
          <li class="nav-item"><a class="nav-link active" href="help.html">Aide</a></li>
          <li class="nav-item"><a class="nav-link" href="contact.html">Contact</a></li>
        </ul>
        <div class="d-flex align-items-center" id="auth-links"></div>
        <div id="user-menu" class="dropdown ms-3 d-none">
          <button type="button" class="btn btn-ef-outline dropdown-toggle" data-bs-toggle="dropdown"><i class="bi bi-person-circle me-1"></i> <span id="nav-user-name"></span></button>
          <ul class="dropdown-menu dropdown-menu-end">
            <li><a class="dropdown-item" id="nav-dashboard-link" href="dashboard.html">Mon espace</a></li>
            <li><hr class="dropdown-divider"></li>
            <li><button type="button" class="dropdown-item" data-action="logout">Déconnexion</button></li>
          </ul>
        </div>
      </div>
    </div>
  </nav>

  <section class="py-5 bg-light">
    <div class="container">
      <div class="text-center mb-5">
        <h1 class="section-title">Centre d'aide</h1>
        <p class="section-subtitle mx-auto">FAQ, support et guides pour utiliser EventFlow Africa</p>
      </div>

      <div class="row g-4">
        <div class="col-lg-7">
          <div class="help-card p-4 mb-4">
            <h4 class="mb-3"><i class="bi bi-question-circle me-2"></i>Questions fréquentes</h4>
            <div class="accordion" id="faq-accordion"></div>
          </div>

          <div class="row g-3">
            <div class="col-md-6">
              <a href="events.html" class="help-quick-link">
                <i class="bi bi-search"></i>
                <span>Rechercher un événement</span>
              </a>
            </div>
            <div class="col-md-6">
              <a href="dashboard.html#tickets" class="help-quick-link">
                <i class="bi bi-ticket-perforated"></i>
                <span>Mes billets</span>
              </a>
            </div>
            <div class="col-md-6">
              <a href="dashboard.html#favorites" class="help-quick-link">
                <i class="bi bi-heart"></i>
                <span>Mes favoris</span>
              </a>
            </div>
            <div class="col-md-6">
              <a href="register.html" class="help-quick-link">
                <i class="bi bi-person-plus"></i>
                <span>Créer un compte</span>
              </a>
            </div>
          </div>
        </div>

        <div class="col-lg-5">
          <div class="help-card p-4">
            <h4 class="mb-3"><i class="bi bi-headset me-2"></i>Ouvrir un ticket support</h4>
            <form id="help-form">
              <div class="mb-3">
                <label class="form-label" for="help-name">Nom</label>
                <input type="text" class="form-control" id="help-name" required>
              </div>
              <div class="mb-3">
                <label class="form-label" for="help-email">Email</label>
                <input type="email" class="form-control" id="help-email" required>
              </div>
              <div class="mb-3">
                <label class="form-label" for="help-subject">Sujet</label>
                <select class="form-select" id="help-subject" required>
                  <option value="support">Support technique</option>
                  <option value="billing">Facturation / commande</option>
                  <option value="transfer">Transfert de billet</option>
                  <option value="organizer">Compte organisateur</option>
                  <option value="other">Autre</option>
                </select>
              </div>
              <div class="mb-3">
                <label class="form-label" for="help-message">Message</label>
                <textarea class="form-control" id="help-message" rows="4" required placeholder="Décrivez votre problème..."></textarea>
              </div>
              <button type="submit" class="btn btn-ef-primary w-100"><i class="bi bi-send me-1"></i> Envoyer</button>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>

  <footer class="ef-footer">
    <div class="container"><div class="ef-footer-bottom mb-0 mt-0 pt-3"><p class="mb-0">&copy; 2026 EventFlow Africa</p></div></div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
  <script src="js/firebase-config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/support.js"></script>
  <script src="js/main.js"></script>
  <script src="js/pwa.js"></script>
</body>
</html>
